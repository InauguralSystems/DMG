name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: unit tests (in devcontainer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Build the devcontainer (EigenScript pinned by .devcontainer/Dockerfile's
      # EIGS_REF — replaces the old clone-HEAD step that pinned nothing) and run
      # the unit tests + the fast input-script smoke (20K cycles on the
      # committed cpu_instrs.gb) inside it. eigenscript on PATH is the gfx
      # build, which runs these headless tests fine. The full Blargg suites
      # and gfx smoke stay out of CI here (slow), same as before.
      - name: Build devcontainer and run unit tests
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            set -e
            tests/check_twins.sh
            eigenscript tests/test_cpu.eigs
            eigenscript tests/test_memory.eigs
            eigenscript tests/test_ppu.eigs
            eigenscript tests/test_joypad.eigs
            tests/run_input_script_smoke.sh
