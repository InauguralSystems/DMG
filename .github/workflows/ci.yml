name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: unit tests (in devcontainer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the devcontainer (EigenScript pinned by .devcontainer/Dockerfile's
      # EIGS_REF — replaces the old clone-HEAD step that pinned nothing) and run
      # the ROM-free unit tests inside it. eigenscript on PATH is the gfx build,
      # which runs these headless tests fine. The Blargg suites and gfx smoke
      # stay out of CI here (slow / ROM-gated), same as before.
      - name: Build devcontainer and run unit tests
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            set -e
            eigenscript tests/test_cpu.eigs
            eigenscript tests/test_memory.eigs
